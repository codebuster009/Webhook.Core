services:
  postgres:
    image: postgres:16-alpine
    container_name: webhook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: webhook
      POSTGRES_PASSWORD: webhook
      POSTGRES_DB: webhook
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: webhook-api
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_URL: postgresql://webhook:webhook@postgres:5432/webhook?schema=public
    depends_on:
      - postgres

  worker:
    build:
      context: ./backend
    container_name: webhook-worker
    restart: unless-stopped
    command: ["node", "src/worker.js"]
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      DATABASE_URL: postgresql://webhook:webhook@postgres:5432/webhook?schema=public
      WORKER_CONCURRENCY: 4
      LEASE_SWEEP_MS: 30000
    depends_on:
      - postgres

  mock-partner:
    build:
      context: ./mock-partner
    container_name: webhook-mock-partner
    restart: unless-stopped
    ports:
      - "4001:4001"
    volumes:
      - ./mock-partner/partner-secrets.json:/app/partner-secrets.json

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:3000
    container_name: webhook-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
