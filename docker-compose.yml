services:
  postgres:
    image: postgres:16-alpine
    container_name: webhook-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: webhook
      POSTGRES_PASSWORD: webhook
      POSTGRES_DB: webhook
    ports:
      # Use 5433 on host if another Postgres owns 5432 locally
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U webhook -d webhook"]
      interval: 3s
      timeout: 5s
      retries: 10
      start_period: 5s

  backend:
    build:
      context: ./backend
    container_name: webhook-api
    restart: unless-stopped
    ports:
      # Use 3010 on host if another app (e.g. a local dev server) already uses 3000 on IPv4
      - "3010:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_URL: postgresql://webhook:webhook@postgres:5432/webhook?schema=public
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    build:
      context: ./backend
    container_name: webhook-worker
    restart: unless-stopped
    command: ["sh", "-c", "npx prisma migrate deploy && node src/worker.js"]
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      DATABASE_URL: postgresql://webhook:webhook@postgres:5432/webhook?schema=public
      WORKER_CONCURRENCY: 4
      LEASE_SWEEP_MS: 30000
    depends_on:
      postgres:
        condition: service_healthy

  mock-partner:
    build:
      context: ./mock-partner
    container_name: webhook-mock-partner
    restart: unless-stopped
    ports:
      - "4001:4001"
    environment:
      # Set to 1 in .env for always-200 mock responses (reliable UI demos)
      DEMO_ALWAYS_OK: ${DEMO_ALWAYS_OK:-0}
    volumes:
      - ./mock-partner/partner-secrets.json:/app/partner-secrets.json

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:3010
    container_name: webhook-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

  # Continuous fake upstream screening traffic (same script as host: scripts/simulate-screening.js).
  simulate-screening:
    image: node:20-alpine
    working_dir: /repo
    volumes:
      - ./:/repo
    environment:
      API_URL: http://backend:3000
      INTERVAL_MS: ${SCREEN_INTERVAL_MS:-12000}
      EVENTS_PER_TICK: ${SCREEN_EVENTS_PER_TICK:-4}
    command: ["node", "scripts/simulate-screening.js"]
    depends_on:
      - backend
    restart: unless-stopped

  # One-shot demo data: partners + sample events (requires profile `seed`).
  #   docker compose --profile seed run --rm seed-demo
  seed-demo:
    image: node:20-alpine
    working_dir: /repo
    volumes:
      - ./:/repo
    environment:
      API_URL: http://backend:3000
      MOCK_URL: http://mock-partner:4001
    command: ["node", "scripts/seed-demo.js"]
    depends_on:
      - backend
      - mock-partner
    profiles:
      - seed

volumes:
  postgres_data:
